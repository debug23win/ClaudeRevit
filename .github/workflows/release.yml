name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.9). action-gh-release creates the tag at the chosen ref."
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Revit 2025/2026 target net8.0-windows, 2027 targets net10.0-windows — both SDKs
      # (and their Windows Desktop targeting packs) must be present.
      - name: Setup .NET 8 + 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Determine version
        id: vars
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version || github.ref_name }}"
          if (-not $tag.StartsWith("v")) { $tag = "v$tag" }
          "version=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # One add-in DLL cannot load into every Revit: 2025/2026 host .NET 8, 2027 hosts
      # .NET 10. Build each supported version against its matching Revit API reference
      # package and stage it under installer\payload\<year>\ for the installer to bundle,
      # plus a per-version zip for the install.ps1 path.
      - name: Build all Revit versions
        shell: pwsh
        run: |
          $ver = "${{ steps.vars.outputs.version }}"
          foreach ($rv in '2025','2026','2027') {
            Write-Host "=== Building for Revit $rv ==="
            # Clean between versions: 2025/2026 (net8) and 2027 (net10) share bin/obj.
            Remove-Item ClaudeRevit\bin, ClaudeRevit\obj -Recurse -Force -ErrorAction SilentlyContinue
            dotnet build ClaudeRevit\ClaudeRevit.csproj -c Release -p:RevitVersion=$rv -p:SkipDeploy=true
            if ($LASTEXITCODE -ne 0) { throw "Build failed for Revit $rv" }
            $src = "ClaudeRevit\bin\Release\release"
            if (-not (Test-Path $src)) { throw "Staging folder not found for Revit $rv at $src" }
            $dst = "installer\payload\$rv"
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item "$src\*" $dst -Recurse -Force
            Compress-Archive -Path "$dst\*" -DestinationPath "ClaudeRevit-$ver-Revit$rv.zip" -Force
          }
          Get-ChildItem "ClaudeRevit-$ver-Revit*.zip" | Format-List Name, Length

      # Refuse to silently move a published release tag: a manual dispatch may only (re)tag
      # a version that doesn't exist yet, or one that already points at this very commit.
      - name: Guard against retagging an existing release (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.version }}"
          $existing = (git ls-remote origin "refs/tags/$tag") -split "\s+" | Select-Object -First 1
          if ($existing -and $existing -ne "${{ github.sha }}") {
            throw "Tag $tag already exists at $existing. Refusing to move a published tag — pick a new version or delete the tag/release deliberately first."
          }

      - name: Compile installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer\ClaudeRevit.iss
          options: /DAppVersion=${{ steps.vars.outputs.version }} /Qp

      - name: Locate built installer
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem "installer\output\*.exe" | Select-Object -First 1
          if (-not $exe) { throw "Installer .exe not found" }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Installer: $($exe.FullName) ($([math]::Round($exe.Length / 1KB, 1)) KB)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: ${{ steps.vars.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            ClaudeRevit-${{ steps.vars.outputs.version }}-Revit2025.zip
            ClaudeRevit-${{ steps.vars.outputs.version }}-Revit2026.zip
            ClaudeRevit-${{ steps.vars.outputs.version }}-Revit2027.zip
            ${{ steps.installer.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
